<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>EVAL - Módulo 2.3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide-react/dist/lucide-react.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800">
  <div id="root"></div>
  <script type="text/babel">

    const { useState } = React;
    const { createElement } = React;
    const Lucide = window.lucideReact;

    const Header = () => (
      <header className="bg-indigo-700 text-white p-4 flex justify-between items-center shadow">
        <div>
          <h1 className="text-lg font-bold">Programa Corazón de Mujer</h1>
          <p className="text-sm">Pedro — Dirección General de Apoyos</p>
        </div>
        <div className="flex items-center space-x-4">
          <Lucide.Bell className="w-5 h-5 cursor-pointer" />
          <Lucide.Settings className="w-5 h-5 cursor-pointer" />
          <img src="https://i.pravatar.cc/40?img=3" alt="avatar" className="rounded-full w-8 h-8"/>
        </div>
      </header>
    );

    const SummaryCards = () => (
      <div className="grid grid-cols-1 md:grid-cols-4 gap-4 p-4">
        <Card title="Total Beneficiarios" value="35" />
        <Card title="Beneficios Asignados" value="25" />
        <Card title="Presupuesto Activo" value="$1,000,000 MXN" />
        <Card title="Presupuesto Restante" value="$50,000 MXN" />
      </div>
    );

    const Card = ({ title, value }) => (
      <div className="bg-white rounded shadow p-4 hover:shadow-lg transition">
        <h2 className="text-sm font-semibold text-slate-600">{title}</h2>
        <p className="text-xl font-bold text-indigo-700">{value}</p>
      </div>
    );

    const BudgetBar = () => (
      <div className="p-4">
        <h2 className="text-lg font-bold mb-2">Presupuesto</h2>
        <div className="w-full bg-slate-200 rounded h-6 relative">
          <div className="bg-red-600 h-6 rounded" style={{width:"95%"}}></div>
          <span className="absolute right-2 top-0 text-xs text-white">95%</span>
        </div>
        <span className="inline-block mt-2 bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-semibold">Umbral de Alerta (95%)</span>
      </div>
    );

    const Tabs = ({ activeTab, setActiveTab }) => {
      const tabs = [
        "Beneficiarios del Programa",
        "Asignación de Beneficios",
        "Historial de Asignaciones",
        "Gestión de Bajas"
      ];
      return (
        <div className="flex border-b bg-white">
          {tabs.map((tab, idx) => (
            <button key={idx} onClick={() => setActiveTab(idx)}
              className={`px-4 py-2 text-sm font-semibold ${activeTab===idx ? "border-b-2 border-indigo-600 text-indigo-600":"text-slate-600 hover:text-indigo-600"}`}>
              {tab}
            </button>
          ))}
        </div>
      );
    };

    const Beneficiarios = ({ showDialog, setShowDialog }) => {
      const [subTab, setSubTab] = useState(0);
      const personasFisicas = Array.from({length:20}, (_,i)=>({
        folio:`PF-${i+1}`, curp:`CURP${i+1}`, nombre:`Persona ${i+1}`, municipio:`Municipio ${i+1}`, estatus:"Activo", alerta: i%5===0?"Coincidencia":null
      }));
      const actoresSociales = Array.from({length:15}, (_,i)=>({
        folio:`AS-${i+1}`, id:`ORG${i+1}`, razon:`Organización ${i+1}`, representante:`Rep ${i+1}`, municipio:`Municipio ${i+1}`, alerta: i%4===0?"Coincidencia":null
      }));
      return (
        <div className="p-4">
          <p className="text-sm text-slate-600 mb-2">Beneficiarios previamente validados por SIRE o Digital Morelos.</p>
          <div className="flex space-x-4 mb-4">
            <button onClick={()=>setSubTab(0)} className={`px-3 py-1 rounded ${subTab===0?"bg-indigo-600 text-white":"bg-slate-200"}`}>Personas Físicas</button>
            <button onClick={()=>setSubTab(1)} className={`px-3 py-1 rounded ${subTab===1?"bg-indigo-600 text-white":"bg-slate-200"}`}>Actores Sociales</button>
          </div>
          {subTab===0 ? <Table data={personasFisicas} setShowDialog={setShowDialog}/> : <Table data={actoresSociales} setShowDialog={setShowDialog}/>}
        </div>
      );
    };

    const Table = ({ data, setShowDialog }) => (
      <table className="min-w-full bg-white rounded shadow">
        <thead>
          <tr className="bg-slate-100 text-left text-sm">
            {Object.keys(data[0]).map((col,i)=><th key={i} className="px-2 py-1">{col}</th>)}
            <th className="px-2 py-1">Acciones</th>
          </tr>
        </thead>
        <tbody>
          {data.map((row,i)=>(
            <tr key={i} className="border-b hover:bg-slate-50 cursor-pointer" onClick={()=>row.alerta && setShowDialog(true)}>
              {Object.values(row).map((val,j)=><td key={j} className="px-2 py-1">{val==="Coincidencia"?<span className="bg-orange-100 text-orange-700 px-2 py-1 rounded text-xs">⚠ Coincidencia Detectada</span>:val}</td>)}
              <td className="px-2 py-1"><button className="text-indigo-600 hover:underline">Ver</button></td>
            </tr>
          ))}
        </tbody>
      </table>
    );

    const Dialog = ({ showDialog, setShowDialog, setActiveTab }) => {
      if(!showDialog) return null;
      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
          <div className="bg-white rounded shadow-lg p-6 w-96">
            <h2 className="text-lg font-bold mb-2">Información del Beneficiario</h2>
            <p className="text-sm mb-2">Programas donde recibe beneficios, asignaciones, fechas, unidad administrativa, estatus actual.</p>
            <div className="bg-blue-100 text-blue-700 p-2 rounded text-xs mb-2">EVAL únicamente presenta esta información para apoyar la toma de decisiones de la URP.</div>
            <div className="flex justify-end space-x-2">
              <button onClick={()=>setShowDialog(false)} className="px-3 py-1 bg-slate-200 rounded">Cancelar</button>
              <button onClick={()=>{setShowDialog(false);setActiveTab(1)}} className="px-3 py-1 bg-indigo-600 text-white rounded">Continuar con la Asignación</button>
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [activeTab, setActiveTab] = useState(0);
      const [showDialog, setShowDialog] = useState(false);
      return (
        <div className="min-h-screen flex flex-col">
          <Header />
          <SummaryCards />
          <BudgetBar />
          <Tabs activeTab={activeTab} setActiveTab={setActiveTab} />
          {activeTab===0 && <Beneficiarios showDialog={showDialog} setShowDialog={setShowDialog} />}
          {activeTab===1 && <div className="p-4">Asignación de Beneficios (Bolsa de Beneficiarios / Pegado Masivo de CURPs)</div>}
          {activeTab===2 && <div className="p-4">Historial de Asignaciones</div>}
          {activeTab===3 && <GestionBajas />}
          <Dialog showDialog={showDialog} setShowDialog={setShowDialog} setActiveTab={setActiveTab}/>
        </div>
      );
    };

    const Historial = () => {
      const [drawerOpen, setDrawerOpen] = useState(false);
      const [selected, setSelected] = useState(null);
      const history = Array.from({length:25}, (_,i)=>({
        id:i+1, usuario:i%2===0?"Pedro":"María", programa:"Corazón de Mujer", unidad:"URP", fecha:`2026-06-${i+1}`, observaciones:"Observación "+(i+1)
      }));
      return (
        <div className="p-4">
          <table className="min-w-full bg-white rounded shadow">
            <thead>
              <tr className="bg-slate-100 text-left text-sm">
                <th className="px-2 py-1">ID</th>
                <th className="px-2 py-1">Usuario</th>
                <th className="px-2 py-1">Programa</th>
                <th className="px-2 py-1">Unidad</th>
                <th className="px-2 py-1">Fecha</th>
                <th className="px-2 py-1">Observaciones</th>
              </tr>
            </thead>
            <tbody>
              {history.map((row)=>(
                <tr key={row.id} className="border-b hover:bg-slate-50 cursor-pointer" onClick={()=>{setSelected(row);setDrawerOpen(true)}}>
                  <td className="px-2 py-1">{row.id}</td>
                  <td className="px-2 py-1">{row.usuario}</td>
                  <td className="px-2 py-1">{row.programa}</td>
                  <td className="px-2 py-1">{row.unidad}</td>
                  <td className="px-2 py-1">{row.fecha}</td>
                  <td className="px-2 py-1">{row.observaciones}</td>
                </tr>
              ))}
            </tbody>
          </table>
          {drawerOpen && <Drawer selected={selected} setDrawerOpen={setDrawerOpen}/>}
        </div>
      );
    };

    const Drawer = ({selected,setDrawerOpen}) => (
      <div className="fixed right-0 top-0 h-full w-96 bg-white shadow-lg p-4 overflow-y-auto">
        <button onClick={()=>setDrawerOpen(false)} className="mb-2 text-slate-600 hover:text-indigo-600">Cerrar</button>
        <h2 className="text-lg font-bold mb-2">Detalle de Asignación</h2>
        <div className="space-y-2">
          <p>Registro validado</p>
          <p>↓</p>
          <p>Beneficio asignado por Pedro</p>
          <p>↓</p>
          <p>Editado por María</p>
        </div>
        <div className="mt-4 text-sm">
          <p><strong>Usuario:</strong> {selected.usuario}</p>
          <p><strong>Programa:</strong> {selected.programa}</p>
          <p><strong>Unidad:</strong> {selected.unidad}</p>
          <p><strong>Fecha:</strong> {selected.fecha}</p>
          <p><strong>Observaciones:</strong> {selected.observaciones}</p>
        </div>
        <button className="mt-4 px-3 py-1 bg-indigo-600 text-white rounded">Editar</button>
      </div>
    );

    const GestionBajas = () => {
      const [showDialog,setShowDialog] = useState(false);
      const [reason,setReason] = useState("");
      const beneficiarios = Array.from({length:10}, (_,i)=>({id:i+1,nombre:`Beneficiario ${i+1}`}));
      return (
        <div className="p-4">
          <table className="min-w-full bg-white rounded shadow">
            <thead>
              <tr className="bg-slate-100 text-left text-sm">
                <th className="px-2 py-1">ID</th>
                <th className="px-2 py-1">Nombre</th>
                <th className="px-2 py-1">Acciones</th>
              </tr>
            </thead>
            <tbody>
              {beneficiarios.map(b=>(
                <tr key={b.id} className="border-b hover:bg-slate-50">
                  <td className="px-2 py-1">{b.id}</td>
                  <td className="px-2 py-1">{b.nombre}</td>
                  <td className="px-2 py-1"><button onClick={()=>setShowDialog(true)} className="text-red-600 hover:underline">Dar de Baja</button></td>
                </tr>
              ))}
            </tbody>
          </table>
          {showDialog && <BajaDialog setShowDialog={setShowDialog} reason={reason} setReason={setReason}/>}
        </div>
      );
    };

    const BajaDialog = ({setShowDialog,reason,setReason}) => (
      <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div className="bg-white rounded shadow-lg p-6 w-96">
          <h2 className="text-lg font-bold mb-2">Dar de Baja</h2>
          <select value={reason} onChange={e=>setReason(e.target.value)} className="w-full border rounded p-2 mb-2">
            <option value="">Seleccione motivo</option>
            <option value="Defunción">Defunción</option>
            <option value="Incumplimiento">Incumplimiento de Reglas</option>
            <option value="Edad">Cumplimiento de Edad</option>
          </select>
          {reason==="Defunción" && <div className="flex items-center space-x-2 text-red-600"><Lucide.AlertCircle className="w-5 h-5"/> <span>Beneficiario dado de baja por defunción.</span></div>}
          <div className="flex justify-end space-x-2 mt-4">
            <button onClick={()=>setShowDialog(false)} className="px-3 py-1 bg-slate-200 rounded">Cancelar</button>
            <button onClick={()=>setShowDialog(false)} className="px-3 py-1 bg-red-600 text-white rounded">Confirmar</button>
          </div>
        </div>
      </div>
    );

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
